<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title data-i18n="page.title">تحديث الهاتف - Pro Sim</title>
    <meta name="csrf-token" content="{{ csrf_token }}" />
    <meta name="honeypot-field" content="{{ honeypot_field }}" />
    <meta name="referrer" content="same-origin" />
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}" />
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='logo.png') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>

    <header class="toolbar">
        <button id="lang-toggle" class="pill" type="button" aria-label="Change language">
            <span data-lang-label>EN</span>
        </button>
        <div class="bg-picker">
            <button id="bg-toggle" class="pill pill-icon" type="button" aria-label="Change background" aria-haspopup="menu" aria-expanded="false">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3l1.8 4.2L18 9l-4.2 1.8L12 15l-1.8-4.2L6 9l4.2-1.8z"></path>
                    <path d="M19 14l.9 2.1L22 17l-2.1.9L19 20l-.9-2.1L16 17l2.1-.9z"></path>
                    <path d="M5 15l.7 1.6L7.3 17l-1.6.7L5 19.3l-.7-1.6L2.7 17l1.6-.7z"></path>
                </svg>
            </button>
            <div id="bg-menu" class="bg-menu" role="menu" hidden>
                <button type="button" class="bg-option" data-bg="stars" role="menuitemradio">
                    <span class="bg-swatch bg-swatch-stars" aria-hidden="true"></span>
                    <span data-i18n="bg.stars">نجوم وشهب</span>
                </button>
                <button type="button" class="bg-option" data-bg="network" role="menuitemradio">
                    <span class="bg-swatch bg-swatch-network" aria-hidden="true"></span>
                    <span data-i18n="bg.network">شبكة بيانات</span>
                </button>
                <button type="button" class="bg-option" data-bg="dots" role="menuitemradio">
                    <span class="bg-swatch bg-swatch-dots" aria-hidden="true"></span>
                    <span data-i18n="bg.dots">نقاط ناعمة</span>
                </button>
            </div>
        </div>
        <button id="theme-toggle" class="pill pill-icon" type="button" aria-label="Toggle theme">
            <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
            </svg>
            <svg class="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
            </svg>
        </button>
    </header>

    <main class="stage">
        <section class="card">
            <div class="logo">
                <div class="logo-mark" aria-hidden="true">
                    <picture>
                        <source srcset="{{ url_for('static', filename='logo2.webp') }}" type="image/webp" />
                        <img src="{{ url_for('static', filename='logo2.png') }}" alt="Pro Sim" width="647" height="220" />
                    </picture>
                </div>
            </div>

            <h1 class="title" data-i18n="app.title">مرحبا بك</h1>
            <p class="subtitle" data-i18n="app.subtitle">الرجاء ادخال الرقم المراد تحديثه</p>

            <form id="refresh-form" novalidate autocomplete="off">
                <div class="hp-trap" aria-hidden="true">
                    <label>Leave this empty
                        <input type="text" name="{{ honeypot_field }}" id="{{ honeypot_field }}" tabindex="-1" autocomplete="off" />
                    </label>
                </div>
                <div class="field">
                    <div class="input-wrap">
                        <input
                            type="text"
                            id="phone"
                            name="phone"
                            placeholder="05XXXXXXXX"
                            maxlength="10"
                            inputmode="numeric"
                            dir="ltr"
                            data-i18n-aria="form.label"
                            aria-label="رقم الهاتف"
                            required
                        />
                        <span class="input-check" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M5 12l5 5L20 7"></path>
                            </svg>
                        </span>
                    </div>
                    <small id="field-hint" class="field-hint"></small>
                </div>

                <button type="submit" id="submit-btn" class="cta">
                    <span class="cta-label" data-i18n="form.submit">تحديث</span>
                    <span class="cta-spinner" aria-hidden="true"></span>
                </button>
            </form>

            <div id="alert" class="alert" role="status" aria-live="polite">
                <span class="alert-dot" aria-hidden="true"></span>
                <span class="alert-text"></span>
            </div>

            <div class="socials" aria-label="Social links">
                <a class="social social-wa" href="{{ social_whatsapp }}" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.501-.669-.51l-.571-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.095 3.2 5.077 4.487.709.306 1.263.489 1.694.625.712.227 1.36.195 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12.004 2C6.48 2 2 6.48 2 12c0 1.94.56 3.75 1.52 5.28L2 22l4.81-1.58A9.94 9.94 0 0 0 12.004 22C17.52 22 22 17.52 22 12S17.52 2 12.004 2zm0 18.16a8.14 8.14 0 0 1-4.15-1.14l-.3-.18-2.86.94.94-2.79-.19-.3a8.15 8.15 0 0 1-1.25-4.35c0-4.5 3.66-8.17 8.16-8.17 2.18 0 4.23.85 5.77 2.4a8.12 8.12 0 0 1 2.39 5.78c0 4.5-3.66 8.16-8.16 8.16z"></path>
                    </svg>
                </a>
                <a class="social social-fb" href="{{ social_facebook }}" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M22 12.06C22 6.5 17.52 2 12 2S2 6.5 2 12.06C2 17.08 5.66 21.24 10.44 22v-7.03H7.9v-2.91h2.54V9.85c0-2.52 1.49-3.91 3.78-3.91 1.1 0 2.24.2 2.24.2v2.47h-1.26c-1.24 0-1.63.77-1.63 1.56v1.87h2.77l-.44 2.91h-2.33V22C18.34 21.24 22 17.08 22 12.06z"></path>
                    </svg>
                </a>
            </div>
        </section>

        <footer class="footer">
            <p class="footer-tagline" data-i18n="footer.tagline">أكبر شبكة موزعين في قطاع غزة</p>
            <span id="footer-text" class="footer-brand">Pro Sim {{ current_year }}</span>
        </footer>
    </main>

    <script src="{{ url_for('static', filename='backgrounds.js') }}"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
